<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLock Command - Live Alert Feed</title>
    <!-- Leaflet.js Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .navbar {
            background: #0a0a0a;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00d4ff;
        }

        .navbar-left h1 {
            margin: 0;
            display: inline-block;
            margin-right: 30px;
        }

        .navbar-right {
            display: flex;
            gap: 15px;
        }

        .nav-link {
            background: #00d4ff;
            color: #000;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: #00e6ff;
            transform: translateY(-2px);
        }

        .container {
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
        }
        .upload-link {
            background: #ff4444;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        .upload-link:hover {
            background: #ff6666;
            transform: translateY(-2px);
        }
        #map {
            height: 400px;
            width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .alerts {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .alert-card {
            background: #1e1e1e;
            padding: 15px;
            border-left: 4px solid #ff4444;
            border-radius: 4px;
        }
        .timestamp {
            color: #888;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-left">
            <h1>🛡️ AuraLock</h1>
        </div>
        <div class="navbar-right">
            <a href="dashboard.html" class="nav-link">📊 Full Dashboard</a>
            <a href="reports.html" class="nav-link">⚖️ Reports</a>
            <a href="upload.html" class="nav-link">📤 Upload Content</a>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <div>
                <h1>Live Alert Feed</h1>
                <p>Real-time monitoring for sports content piracy</p>
            </div>
        </div>

        <!-- Map container -->
        <div id="map"></div>

        <!-- Alert Feed -->
        <h2>Live Alert Feed</h2>
        <div class="alerts" id="alert-feed">
            <!-- Alerts will be injected here via JS -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
