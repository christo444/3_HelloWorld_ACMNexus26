<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamTrace Enterprise | Anti-Piracy Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --panel: rgba(30, 41, 59, 0.7); --accent: #38bdf8; --danger: #ef4444; --success: #22c55e; }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .dashboard { width: 100%; max-width: 800px; padding: 40px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; margin: 0; font-weight: 700; letter-spacing: -1px; text-transform: uppercase; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #94a3b8; font-size: 1.1rem; margin-top: 10px; }
        
        .glass-panel { background: var(--panel); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; color: #cbd5e1; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input, .input-group textarea { width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; font-size: 1rem; font-family: 'Inter', monospace; outline: none; transition: all 0.3s ease; box-sizing: border-box; }
        .input-group textarea { min-height: 120px; resize: vertical; }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        
        .btn-scan { width: 100%; padding: 18px; border: none; border-radius: 8px; background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white; font-size: 1.2rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5); }
        .btn-scan:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -10px rgba(59, 130, 246, 0.7); }
        .btn-scan:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        /* Loading Animation */
        .scanning-ui { display: none; text-align: center; margin-top: 40px; }
        .radar { position: relative; width: 100px; height: 100px; border-radius: 50%; border: 2px solid rgba(56, 189, 248, 0.3); margin: 0 auto; overflow: hidden; box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .radar::before { content: ''; position: absolute; top: 0; left: 50%; width: 50%; height: 50%; transform-origin: bottom left; background: linear-gradient(45deg, rgba(56, 189, 248, 0), rgba(56, 189, 248, 0.8)); animation: sweep 2s linear infinite; }
        @keyframes sweep { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .scanning-text { color: var(--accent); margin-top: 20px; font-weight: 500; letter-spacing: 2px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Results UI */
        .result-ui { display: none; margin-top: 40px; text-align: center; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .score-circle { display: inline-flex; justify-content: center; align-items: center; width: 120px; height: 120px; border-radius: 50%; font-size: 2.2rem; font-weight: 700; margin-bottom: 20px; border: 4px solid #fff; }
        .status-text { font-size: 1.8rem; font-weight: 700; text-transform: uppercase; margin: 10px 0; letter-spacing: 1px; }
        .report-link { display: inline-block; margin-top: 20px; color: #94a3b8; text-decoration: none; border-bottom: 1px border-bottom; transition: color 0.3s; }
        .report-link:hover { color: white; }

        .pirated .score-circle { border-color: var(--danger); color: var(--danger); box-shadow: 0 0 40px rgba(239, 68, 68, 0.4); }
        .pirated .status-text { color: var(--danger); }
        .clean .score-circle { border-color: var(--success); color: var(--success); box-shadow: 0 0 40px rgba(34, 197, 94, 0.4); }
        .clean .status-text { color: var(--success); }

    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>StreamTrace</h1>
        <p>Enterprise Anti-Piracy Forensic Engine</p>
    </div>

    <div class="glass-panel">
        <div class="input-group">
            <label>Original Source Broadcast Code or URL</label>
            <textarea id="orig_input" placeholder="Paste original stream URL or embed code (iframe/script/html)"></textarea>
        </div>
        <div class="input-group">
            <label>Target Suspect Stream Code or URL</label>
            <textarea id="target_input" placeholder="Paste suspect stream URL or embed code (iframe/script/html)"></textarea>
        </div>
        <button id="scanBtn" class="btn-scan" onclick="startScan()">Initiate Forensic Scan</button>

        <div id="scanningUI" class="scanning-ui">
            <div class="radar"></div>
            <div class="scanning-text">INJECTING FORENSIC SCRAPERS...</div>
            <p style="color: #64748b; font-size: 0.9rem;">Recording 15-second visual fingerprint. Please wait.</p>
        </div>

        <div id="resultUI" class="result-ui">
            <div id="scoreCircle" class="score-circle">0%</div>
            <div id="statusText" class="status-text">ANALYZING...</div>
            <p style="color: #94a3b8;">Confidence threshold matched against high-frequency visual hashes.</p>
            <a id="reportLink" class="report-link" href="#" target="_blank">View Detailed Forensic HTML Report ➔</a>
        </div>
    </div>
</div>

<script>
    function extractUrlFromInput(rawInput) {
        const trimmed = (rawInput || '').trim();
        if (!trimmed) return '';

        // Handle direct URL paste first
        if (/^https?:\/\//i.test(trimmed)) {
            return trimmed;
        }

        // Handle pasted embed/snippet code by extracting src/href
        const parser = new DOMParser();
        const doc = parser.parseFromString(trimmed, 'text/html');
        const candidate = doc.querySelector('[src], [href]');
        if (!candidate) return '';

        const extracted = candidate.getAttribute('src') || candidate.getAttribute('href') || '';
        return /^https?:\/\//i.test(extracted.trim()) ? extracted.trim() : '';
    }

    async function startScan() {
        const origRaw = document.getElementById('orig_input').value;
        const orig = extractUrlFromInput(origRaw);
        const targetRaw = document.getElementById('target_input').value;
        const target = extractUrlFromInput(targetRaw);
        const btn = document.getElementById('scanBtn');
        const scanningUI = document.getElementById('scanningUI');
        const resultUI = document.getElementById('resultUI');

        if(!orig || !target) {
            return alert("Please paste valid original and target URLs or embed code.");
        }

        // UI Reset
        btn.disabled = true;
        btn.innerText = "SCANNING...";
        resultUI.style.display = "none";
        scanningUI.style.display = "block";
        resultUI.className = "result-ui"; 

        try {
            const res = await fetch('/api/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ original_url: orig, target_url: target })
            });
            const data = await res.json();
            
            scanningUI.style.display = "none";
            resultUI.style.display = "block";
            
            if(data.error) {
                document.getElementById('statusText').innerText = "SCAN ERROR";
                document.getElementById('scoreCircle').innerText = "!";
                return;
            }

            // Populate Results
            document.getElementById('scoreCircle').innerText = data.similarity + "%";
            document.getElementById('reportLink').href = "/reports/" + data.report_file;

            if(data.is_pirated) {
                resultUI.classList.add('pirated');
                document.getElementById('statusText').innerText = "PIRACY DETECTED";
            } else {
                resultUI.classList.add('clean');
                document.getElementById('statusText').innerText = "CLEAN STREAM";
            }
        } catch (e) {
            alert("Error connecting to backend");
            scanningUI.style.display = "none";
        }

        btn.disabled = false;
        btn.innerText = "INITIATE FORENSIC SCAN";
    }
</script>

</body>
</html>
