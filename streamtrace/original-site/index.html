<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StreamTrace - Official Broadcast</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            overflow: hidden; /* Removes scrolling and scrollbars */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100vw;
            height: 100vh;
            object-fit: fill; /* Violently stretches the video to eliminate any possible black borders */
        }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline>
        <source src="match.mp4" type="video/mp4">
    </video>
</body>
</html>
