<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLock Command - Live Alert Feed</title>
    <!-- Leaflet.js Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }
        #map {
            height: 400px;
            width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .alerts {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .alert-card {
            background: #1e1e1e;
            padding: 15px;
            border-left: 4px solid #ff4444;
            border-radius: 4px;
        }
        .timestamp {
            color: #888;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <h1>AuraLock Command Center</h1>
    <p>Live Monitoring of Potential Pirated Streams</p>

    <!-- Map container -->
    <div id="map"></div>

    <!-- Alert Feed -->
    <h2>Live Alert Feed</h2>
    <div class="alerts" id="alert-feed">
        <!-- Alerts will be injected here via JS -->
    </div>

    <script src="app.js"></script>
</body>
</html>
